<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <defs>
        <!-- App Background Gradient (Indigo to Deep Violet) -->
        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#818CF8" /> <!-- Tailwind indigo-400 -->
            <stop offset="100%" stop-color="#4338CA" /> <!-- Tailwind indigo-700 -->
        </linearGradient>

        <!-- Progress Ring Gradient (Brand to Purple) -->
        <linearGradient id="ring-grad" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#6366F1" /> <!-- Tailwind brand-500 -->
            <stop offset="100%" stop-color="#A855F7" /> <!-- Tailwind purple-500 -->
        </linearGradient>

        <!-- Soft Drop Shadow for the Calendar -->
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#312E81" flood-opacity="0.3" />
        </filter>
        
        <!-- Small Shadow for the binders -->
        <filter id="small-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.25" />
        </filter>
    </defs>

    <!-- Base Rounded App Icon Background -->
    <rect width="512" height="512" rx="120" fill="url(#bg-grad)" />

    <!-- Main Calendar Body -->
    <rect x="116" y="140" width="280" height="280" rx="36" fill="#FFFFFF" filter="url(#shadow)" />
    
    <!-- Calendar Header (Brand Light Blue/Indigo accent) -->
    <path d="M116 176 C116 156.118 132.118 140 152 140 L360 140 C379.882 140 396 156.118 396 176 L396 210 L116 210 L116 176 Z" fill="#EEF2FF" />

    <!-- Calendar Binders (Pills) -->
    <rect x="160" y="110" width="28" height="64" rx="14" fill="#FFFFFF" filter="url(#small-shadow)" />
    <rect x="324" y="110" width="28" height="64" rx="14" fill="#FFFFFF" filter="url(#small-shadow)" />

    <!-- Progress Ring Track (Light slate) -->
    <circle cx="256" cy="305" r="64" fill="none" stroke="#F1F5F9" stroke-width="20" />

    <!-- Progress Ring Active (Gradient) -->
    <!-- Circumference is ~402. Dashoffset of 110 means roughly 75% complete -->
    <circle cx="256" cy="305" r="64" fill="none" stroke="url(#ring-grad)" stroke-width="20" stroke-dasharray="402.12" stroke-dashoffset="110" stroke-linecap="round" transform="rotate(-90 256 305)" />

    <!-- Clock Hands inside Progress Ring -->
    <line x1="256" y1="305" x2="256" y2="275" stroke="#4F46E5" stroke-width="10" stroke-linecap="round" />
    <line x1="256" y1="305" x2="280" y2="305" stroke="#4F46E5" stroke-width="10" stroke-linecap="round" />
    
    <!-- Center Dot of the Clock -->
    <circle cx="256" cy="305" r="7" fill="#4F46E5" />
</svg>